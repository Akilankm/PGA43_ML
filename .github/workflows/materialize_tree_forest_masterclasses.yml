name: Materialize Decision Tree and Random Forest Masterclasses

on:
  push:
    branches:
      - feature/tree-rf-masterclasses
    paths:
      - .github/workflows/materialize_tree_forest_masterclasses.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      PYTHONWARNINGS: ignore

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/tree-rf-masterclasses

      - name: Restore deterministic build sources
        run: |
          mkdir -p scripts
          cat .github/build_payload/build.part.* | base64 --decode | gzip --decompress > scripts/build_tree_forest_masterclasses.py
          cat .github/build_payload/enrich.part.* | base64 --decode | gzip --decompress > scripts/enrich_tree_forest_packages.py
          python -m py_compile scripts/build_tree_forest_masterclasses.py scripts/enrich_tree_forest_packages.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy==2.3.5 pandas==2.2.3 scipy==1.17.0 scikit-learn==1.8.0 matplotlib==3.10.8 nbformat==5.10.4 nbconvert==7.17.1 nbclient==0.10.2 joblib==1.5.2 jupyter-core==5.9.1 jupyter-client==8.7.0 ipykernel==7.1.0

      - name: Build executed packages
        run: python scripts/build_tree_forest_masterclasses.py

      - name: Enrich documentation and navigation
        run: python scripts/enrich_tree_forest_packages.py

      - name: Validate both packages
        run: |
          python decision_tree_classification_masterclass_conda_executed/decision_tree_classification_masterclass/scripts/verify_package.py
          python random_forest_classification_masterclass_conda_executed/random_forest_classification_masterclass/scripts/verify_package.py

      - name: Commit generated masterclasses
        run: |
          rm -rf .github/build_payload
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A README.md scripts/build_tree_forest_masterclasses.py scripts/enrich_tree_forest_packages.py decision_tree_classification_masterclass_conda_executed random_forest_classification_masterclass_conda_executed .github/build_payload
          git commit -m "Add end-to-end Decision Tree and Random Forest masterclasses [skip ci]"
          git push origin HEAD:feature/tree-rf-masterclasses
