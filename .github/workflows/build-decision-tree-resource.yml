name: Build decision tree from scratch resource

on:
  push:
    branches: [master]
    paths:
      - "scripts/build_decision_tree_from_scratch.py"
      - "scripts/decision_tree_builder_payload_b64/**"
      - ".github/workflows/build-decision-tree-resource.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            numpy==2.3.5 \
            pandas==2.2.3 \
            matplotlib==3.10.8 \
            seaborn==0.13.2 \
            nbformat==5.10.4 \
            nbconvert==7.17.1 \
            ipykernel==6.29.5 \
            jupyterlab==4.4.7 \
            notebook==7.4.5

      - name: Register notebook kernel
        run: python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Generate and execute the teaching resource
        run: python scripts/build_decision_tree_from_scratch.py

      - name: Validate generated notebook and artifacts
        run: |
          test -f "decision tree from scratch/decision_tree_from_scratch_play_tennis.ipynb"
          test -f "decision tree from scratch/decision_tree_from_scratch_play_tennis.html"
          test -f "decision tree from scratch/data/play_tennis.csv"
          python - <<'PY'
          import json
          from pathlib import Path
          import nbformat

          root = Path("decision tree from scratch")
          notebook = nbformat.read(
              root / "decision_tree_from_scratch_play_tennis.ipynb",
              as_version=4,
          )
          code_cells = [cell for cell in notebook.cells if cell.cell_type == "code"]
          errors = [
              output
              for cell in code_cells
              for output in cell.get("outputs", [])
              if output.output_type == "error"
          ]
          assert not errors, errors
          assert all(cell.execution_count is not None for cell in code_cells)

          validation = json.loads((root / "validation.json").read_text(encoding="utf-8"))
          assert validation["status"] == "passed"
          assert validation["training_accuracy"] == 1.0
          assert validation["root_feature"] == "Outlook"
          assert validation["sunny_split"] == "Humidity"
          assert validation["rain_split"] == "Wind"
          print(f"Validated {len(notebook.cells)} cells with no execution errors.")
          PY

      - name: Add resource to the curated learning paths
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          content = path.read_text(encoding="utf-8")
          marker = "## Reproducibility"
          section = '''### 3. Decision Tree from Scratch — Play Tennis Masterclass

          Path:

          `decision tree from scratch/`

          Covers manual entropy, information gain, Gini impurity, every root and recursive split calculation, categorical and numeric splitting concepts, a from-scratch ID3 implementation, prediction tracing, pruning concepts, and complete visual tree construction.

          [Open the Decision Tree from Scratch README](decision%20tree%20from%20scratch/README.md)

          '''
          section = "\n".join(line.lstrip() for line in section.splitlines())
          if "### 3. Decision Tree from Scratch" not in content:
              if marker not in content:
                  raise RuntimeError(f"README marker not found: {marker}")
              content = content.replace(marker, section + marker)
              path.write_text(content, encoding="utf-8")
          PY

      - name: Remove one-time build internals
        run: |
          rm -rf scripts/decision_tree_builder_payload
          rm -rf scripts/decision_tree_builder_payload_b64
          rm -f scripts/build_decision_tree_from_scratch.py
          rm -f .github/workflows/build-decision-tree-resource.yml

      - name: Commit the validated resource
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: add decision tree from scratch masterclass"
          git push origin master
