name: Expert enrich tree masterclasses

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reproducible notebook runtime
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==2.3.5 pandas==2.2.3 scipy==1.17.0 \
            scikit-learn==1.8.0 matplotlib==3.10.8 \
            nbformat==5.10.4 nbclient==0.10.4 nbconvert==7.17.1 \
            ipykernel==7.1.0 joblib==1.5.3 jupyterlab==4.4.10 notebook==7.4.7

      - name: Assemble transparent expert enrichment source
        run: |
          cat \
            scripts/expert_enrichment.part1 \
            scripts/expert_enrichment.part2 \
            scripts/expert_enrichment.part3 \
            scripts/expert_enrichment.part4 \
            scripts/expert_enrichment.part5 \
            scripts/expert_enrichment.part6 \
            > scripts/enrich_tree_masterclasses_expert.py
          python -m py_compile scripts/enrich_tree_masterclasses_expert.py

      - name: Execute, render and validate expert notebooks
        shell: bash
        run: |
          set -o pipefail
          python scripts/enrich_tree_masterclasses_expert.py 2>&1 | tee expert-enrichment-build.log

      - name: Post failure traceback to pull request
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Expert tree enrichment build failure'
            echo
            echo '```text'
            tail -n 220 expert-enrichment-build.log
            echo '```'
          } > failure-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file failure-comment.md

      - name: Commit validated expert teaching artifacts
        if: success()
        run: |
          rm -f scripts/expert_enrichment.part*
          rm -f expert-enrichment-build.log
          rm -f .github/workflows/expert-enrich-tree-masterclasses.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Enrich tree masterclasses with expert inference and explainability'
          git push origin HEAD:${{ github.head_ref }}
