name: Build Logistic Regression Masterclass

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-logistic-masterclass.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: logistic-regression-masterclass-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: logistic_regression_classification_masterclass/requirements-lock.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r logistic_regression_classification_masterclass/requirements-lock.txt

      - name: Reconstruct notebook builder
        shell: bash
        run: |
          PROJECT=logistic_regression_classification_masterclass
          cat "$PROJECT"/.bootstrap/build_notebook.py.b64.part* \
            | tr -d '\n' \
            | base64 --decode \
            > "$PROJECT/scripts/build_notebook.py"
          echo "e266571477c0d67174b8b1df5b1e7192ca552ff8110760a38496f0d216a52910  $PROJECT/scripts/build_notebook.py" \
            | sha256sum --check

      - name: Generate deterministic teaching data
        run: python logistic_regression_classification_masterclass/scripts/generate_teaching_data.py

      - name: Build clean notebook
        working-directory: logistic_regression_classification_masterclass
        run: |
          python scripts/build_notebook.py
          cp logistic_regression_classification_masterclass.ipynb \
             logistic_regression_classification_masterclass_clean.ipynb

      - name: Execute notebook and export HTML
        working-directory: logistic_regression_classification_masterclass
        env:
          MPLBACKEND: Agg
          PYTHONHASHSEED: '43'
          OMP_NUM_THREADS: '1'
          MKL_NUM_THREADS: '1'
          OPENBLAS_NUM_THREADS: '1'
          NUMEXPR_NUM_THREADS: '1'
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute logistic_regression_classification_masterclass.ipynb \
            --inplace \
            --ExecutePreprocessor.timeout=1200
          jupyter nbconvert \
            --to html logistic_regression_classification_masterclass.ipynb \
            --output logistic_regression_classification_masterclass \
            --output-dir .

      - name: Validate generated package
        working-directory: logistic_regression_classification_masterclass
        run: python scripts/verify_package.py

      - name: Generate package checksums
        working-directory: logistic_regression_classification_masterclass
        shell: bash
        run: |
          rm -rf .bootstrap
          find . -type f \
            ! -name CHECKSUMS.sha256 \
            ! -path './reports/*' \
            -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > CHECKSUMS.sha256

      - name: Commit expanded project files to master
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logistic_regression_classification_masterclass
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Add complete logistic regression masterclass artifacts"
          git push origin HEAD:master
