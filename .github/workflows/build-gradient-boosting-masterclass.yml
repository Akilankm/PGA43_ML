name: Build Gradient Boosting Masterclass

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gradient-boosting-masterclass-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-execute-render-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'

    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install notebook runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'numpy>=2.1,<2.4' \
            'pandas>=2.2,<2.4' \
            'scipy>=1.14,<1.18' \
            'scikit-learn>=1.6,<1.9' \
            'matplotlib>=3.9,<3.11' \
            'joblib>=1.4,<1.6' \
            'ipykernel>=6.29,<7' \
            'nbformat>=5.10,<6' \
            'nbclient>=0.10,<0.11' \
            'nbconvert>=7.16,<8'
          python -m ipykernel install --user --name python3 --display-name 'Python 3'

      - name: Decode deterministic builder
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          encoded = Path('.github/build_payloads/gradient_boosting_builder.py.gz.b64').read_text().strip()
          Path('/tmp/build_gradient_boosting_masterclass.py').write_bytes(
              gzip.decompress(base64.b64decode(encoded))
          )
          PY

      - name: Build, execute, render, and validate
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          python /tmp/build_gradient_boosting_masterclass.py
          python gradient_boosting_masterclass_conda_executed/gradient_boosting_masterclass/scripts/verify_package.py

      - name: Commit generated teaching package to PR branch
        run: |
          rm -f .github/build_payloads/gradient_boosting_builder.py.gz.b64
          rm -f .github/workflows/build-gradient-boosting-masterclass.yml
          rmdir .github/build_payloads 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'Add executed Gradient Boosting masterclass'
          git push origin HEAD:${{ github.head_ref }}
