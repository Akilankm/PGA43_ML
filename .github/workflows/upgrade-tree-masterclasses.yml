name: Upgrade tree masterclasses

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reproducible notebook runtime
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==2.3.5 pandas==2.2.3 scipy==1.17.0 \
            scikit-learn==1.8.0 matplotlib==3.10.8 \
            nbformat==5.10.4 nbclient==0.10.4 nbconvert==7.17.1 \
            ipykernel==7.1.0 joblib==1.5.3 jupyterlab==4.4.10 notebook==7.4.7

      - name: Assemble transparent upgrade source
        run: |
          cat \
            scripts/tree_upgrade_source.part1 \
            scripts/tree_upgrade_source.part2 \
            scripts/tree_upgrade_source.part3 \
            scripts/tree_upgrade_source.part4 \
            > scripts/materialize_tree_ensemble_masterclasses.py
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/materialize_tree_ensemble_masterclasses.py')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              'import matplotlib.pyplot as plt\n',
              'import matplotlib.pyplot as plt\nfrom IPython import get_ipython\nget_ipython().run_line_magic("matplotlib", "inline")\n',
              1,
          )
          path.write_text(source, encoding='utf-8')
          PY
          python -m py_compile scripts/materialize_tree_ensemble_masterclasses.py

      - name: Build, execute, render, and validate masterclasses
        shell: bash
        run: |
          set -o pipefail
          python scripts/materialize_tree_ensemble_masterclasses.py 2>&1 | tee tree-masterclass-build.log

      - name: Post failure traceback to pull request
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Tree masterclass build failure'
            echo
            echo '```text'
            tail -n 160 tree-masterclass-build.log
            echo '```'
          } > failure-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file failure-comment.md

      - name: Commit generated teaching artifacts to PR branch
        if: success()
        run: |
          rm -f scripts/tree_upgrade_source.part*
          rm -f scripts/.tree_masterclass_payload.part*
          rm -f tree-masterclass-build.log
          rm -f .tree_masterclass_upgrade_trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Upgrade tree masterclasses into exhaustive visual learning resources'
          git push origin HEAD:${{ github.head_ref }}
