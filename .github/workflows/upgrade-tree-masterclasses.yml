name: Upgrade tree masterclasses

on:
  push:
    branches: [master]
    paths:
      - 'scripts/tree_upgrade_source.part*'
      - '.github/workflows/upgrade-tree-masterclasses.yml'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MPLBACKEND: Agg
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reproducible notebook runtime
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==2.3.5 pandas==2.2.3 scipy==1.17.0 \
            scikit-learn==1.8.0 matplotlib==3.10.8 \
            nbformat==5.10.4 nbclient==0.10.4 nbconvert==7.17.1 \
            ipykernel==7.1.0 joblib==1.5.3 jupyterlab==4.4.10 notebook==7.4.7

      - name: Assemble transparent upgrade source
        run: |
          cat \
            scripts/tree_upgrade_source.part1 \
            scripts/tree_upgrade_source.part2 \
            scripts/tree_upgrade_source.part3 \
            scripts/tree_upgrade_source.part4 \
            > scripts/materialize_tree_ensemble_masterclasses.py
          python -m py_compile scripts/materialize_tree_ensemble_masterclasses.py

      - name: Build, execute, render, and validate masterclasses
        run: python scripts/materialize_tree_ensemble_masterclasses.py

      - name: Commit generated teaching artifacts
        run: |
          rm -f scripts/tree_upgrade_source.part*
          rm -f scripts/.tree_masterclass_payload.part*
          rm -f .github/workflows/upgrade-tree-masterclasses.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Upgrade tree masterclasses into exhaustive visual learning resources'
          git push origin master
